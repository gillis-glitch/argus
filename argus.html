<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0a0e14">
<title>Argus — the world in real time</title>
<meta name="description" content="Argus: earthquakes, weather, rain radar, satellite, space weather and flagged air traffic. The world in real time, on one page.">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<style>
  :root{
    --bg:#0a0e14; --panel:#111823; --panel2:#0d1420; --line:#1d2a3a;
    --amber:#ffb454; --seismic:#ff5d5d; --meteo:#55c8ff; --space:#b48cff;
    --ok:#69d98c; --txt:#d9e2ec; --muted:#7e8c9d;
    --mono:"SF Mono",ui-monospace,"Cascadia Mono","Roboto Mono",Menlo,monospace;
    --sans:-apple-system,"Segoe UI",Roboto,"Helvetica Neue",sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:var(--bg);color:var(--txt);font-family:var(--sans)}
  body{max-width:1100px;margin:0 auto;padding:0 12px calc(24px + env(safe-area-inset-bottom))}
  a{color:var(--meteo)}

  header{padding:14px 2px 10px}
  .toprow{display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
  h1{font-size:20px;font-weight:800;letter-spacing:.1em;text-transform:uppercase}
  h1 small{display:block;font-family:var(--mono);font-size:10.5px;font-weight:400;color:var(--muted);letter-spacing:.14em;margin-top:3px}
  .selrow{display:flex;gap:6px;flex-wrap:wrap}
  .selrow button{background:var(--panel);border:1px solid var(--line);border-radius:8px;color:var(--muted);padding:7px 10px;font-size:12px;font-family:var(--mono);cursor:pointer}
  .selrow button.on{color:var(--meteo);border-color:var(--meteo)}

  #annunciator{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-top:12px}
  .lamp{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:8px 4px;text-align:center;cursor:pointer}
  .lamp b{display:block;font-family:var(--mono);font-size:10px;letter-spacing:.1em;color:var(--muted)}
  .lamp i{display:block;width:8px;height:8px;border-radius:50%;margin:6px auto 0;background:var(--muted);font-style:normal}
  .lamp span{display:block;font-family:var(--mono);font-size:11px;margin-top:5px;min-height:14px}
  .lamp.ok i{background:var(--ok)}
  .lamp.warn i{background:var(--amber);box-shadow:0 0 10px var(--amber);animation:blink 1.6s infinite}
  .lamp.alert i{background:var(--seismic);box-shadow:0 0 10px var(--seismic);animation:blink 1s infinite}
  @keyframes blink{50%{opacity:.35}}

  #locbar{display:flex;gap:8px;margin-top:12px}
  #locbar input{flex:1;background:var(--panel);border:1px solid var(--line);border-radius:8px;color:var(--txt);padding:10px 12px;font-size:14px;font-family:var(--sans)}
  #locbar button{background:var(--panel);border:1px solid var(--line);border-radius:8px;color:var(--txt);padding:0 14px;font-size:13px;cursor:pointer;white-space:nowrap}
  #locbar button:active{border-color:var(--amber)}

  #map{height:46vh;min-height:300px;border:1px solid var(--line);border-radius:12px;margin-top:12px;background:#060a10}
  .leaflet-container{font-family:var(--mono);background:#060a10}
  #layersel{margin:8px 2px 0}
  .maplegend{font-family:var(--mono);font-size:10px;color:var(--muted);display:flex;gap:14px;margin:8px 2px 0;flex-wrap:wrap}
  .maplegend i{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:4px;font-style:normal}

  #grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:14px}
  @media(max-width:720px){#grid{grid-template-columns:1fr}}
  section{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:14px;border-top:2px solid var(--line)}
  section.s-met{border-top-color:var(--meteo)}
  section.s-sis{border-top-color:var(--seismic)}
  section.s-spc{border-top-color:var(--space)}
  section.s-aer{border-top-color:var(--amber)}
  section.s-pc {border-top-color:var(--ok)}
  section h2{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);display:flex;justify-content:space-between;align-items:baseline;gap:8px}
  section h2 time{font-family:var(--mono);font-size:10px;text-transform:none;letter-spacing:0}
  .big{font-family:var(--mono);font-size:34px;font-weight:600;margin-top:8px}
  .big small{font-size:14px;color:var(--muted);font-weight:400}
  .sub{font-size:13px;color:var(--muted);margin-top:2px}
  .kv{display:flex;gap:16px;margin-top:10px;flex-wrap:wrap}
  .kv div b{display:block;font-family:var(--mono);font-size:15px}
  .kv div span{font-size:10.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}
  .list{margin-top:10px}
  .row{display:flex;justify-content:space-between;gap:8px;padding:7px 0;border-bottom:1px solid var(--line);font-size:13px;align-items:baseline}
  a.row{text-decoration:none;color:inherit}
  a.row:active{background:var(--panel2)}
  .row:last-child{border-bottom:none}
  .row .mono{font-family:var(--mono);font-size:12px}
  .row .dim{color:var(--muted);font-size:11.5px}
  .mag{font-family:var(--mono);font-weight:700;color:var(--seismic);min-width:38px}
  .err{color:var(--muted);font-size:12.5px;margin-top:10px}
  .tag{font-size:9.5px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:2px 6px;border-radius:4px;background:rgba(255,180,84,.15);color:var(--amber);white-space:nowrap}
  #kpbars{display:flex;align-items:flex-end;gap:2px;height:44px;margin-top:10px}
  #kpbars div{flex:1;background:var(--space);opacity:.5;border-radius:2px 2px 0 0;min-height:2px}
  #kpbars div.hot{opacity:1;background:var(--seismic)}

  footer{margin-top:18px;font-size:11px;color:var(--muted);line-height:1.7;text-align:center}
  @media(prefers-reduced-motion:reduce){.lamp i{animation:none!important}}
</style>
</head>
<body>

<header>
  <div class="toprow">
    <h1>Argus<small id="subtitle">—</small></h1>
    <div class="selrow" id="langsel">
      <button data-l="it">IT</button><button data-l="en">EN</button><button data-l="es">ES</button><button data-l="ru">РУ</button><button data-l="zh">中文</button>
    </div>
  </div>
  <div id="annunciator">
    <div class="lamp" id="L-met" onclick="go('p-met')"><b>MET</b><i></i><span>—</span></div>
    <div class="lamp" id="L-sis" onclick="go('p-sis')"><b>SIS</b><i></i><span>—</span></div>
    <div class="lamp" id="L-aer" onclick="go('p-aer')"><b>AER</b><i></i><span>—</span></div>
    <div class="lamp" id="L-spc" onclick="go('p-spc')"><b>SPC</b><i></i><span>—</span></div>
    <div class="lamp" id="L-pc"  onclick="go('p-pc')"><b>ALL</b><i></i><span>—</span></div>
  </div>
  <div id="locbar">
    <input id="q" type="text" placeholder="" enterkeyhint="search">
    <button id="geoBtn"></button>
  </div>
</header>

<div id="map" role="application" aria-label="Live map"></div>
<div class="selrow" id="layersel">
  <button data-m="radar" class="on"></button>
  <button data-m="sat"></button>
  <button data-m="none"></button>
</div>
<div class="maplegend">
  <span><i style="background:var(--seismic)"></i><span id="lg-q"></span></span>
  <span><i style="background:var(--amber)"></i><span id="lg-a"></span></span>
  <span><i style="background:var(--meteo)"></i><span id="lg-r"></span></span>
</div>

<div id="grid">
  <section class="s-met" id="p-met">
    <h2><span id="h-met"></span> <time id="t-met"></time></h2>
    <div class="big" id="met-temp">—<small> °C</small></div>
    <div class="sub" id="met-desc">…</div>
    <div class="kv">
      <div><b id="met-app">—</b><span id="k-feels"></span></div>
      <div><b id="met-wind">—</b><span id="k-wind"></span></div>
      <div><b id="met-hum">—</b><span id="k-hum"></span></div>
      <div><b id="met-rain">—</b><span id="k-rain"></span></div>
    </div>
    <div class="list" id="met-hours"></div>
  </section>

  <section class="s-sis" id="p-sis">
    <h2><span id="h-sis"></span> <time id="t-sis"></time></h2>
    <div class="list" id="sis-list"><div class="err">…</div></div>
  </section>

  <section class="s-aer" id="p-aer">
    <h2><span id="h-aer"></span> <time id="t-aer"></time></h2>
    <div class="sub" id="aer-sum">…</div>
    <div class="list" id="aer-list"></div>
  </section>

  <section class="s-spc" id="p-spc">
    <h2><span id="h-spc"></span> <time id="t-spc"></time></h2>
    <div class="big" id="spc-kp">Kp —</div>
    <div class="sub" id="spc-desc">…</div>
    <div id="kpbars"></div>
    <div class="kv">
      <div><b id="spc-wind">—</b><span id="k-swind"></span></div>
      <div><b id="spc-dens">—</b><span id="k-sdens"></span></div>
    </div>
  </section>

  <section class="s-pc" id="p-pc" style="grid-column:1/-1">
    <h2><span id="h-pc"></span> <time id="t-pc"></time></h2>
    <div class="sub" id="pc-body">…</div>
  </section>
</div>

<footer>
  <a href="https://open-meteo.com" rel="noopener">Open-Meteo</a> ·
  <a href="https://www.rainviewer.com" rel="noopener">RainViewer</a> ·

</footer>

let map, radarLayer, quakeLayer, planeLayer, centerMarker;

const $ = id => document.getElementById(id);
const go = id => $(id).scrollIntoView({behavior:"smooth"});
const now = () => new Date().toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"});
const stamp = id => $(id).textContent = now();
const lamp = (id, state, txt) => { const el=$(id); el.className="lamp "+state; el.querySelector("span").textContent=txt; };
const km = (a,b)=>{const r=Math.PI/180,dLa=(b.lat-a.lat)*r,dLo=(b.lon-a.lon)*r,
  h=Math.sin(dLa/2)**2+Math.cos(a.lat*r)*Math.cos(b.lat*r)*Math.sin(dLo/2)**2;
  return 6371*2*Math.asin(Math.sqrt(h));};
async function j(url){ const r=await fetch(url,{cache:"no-store"}); if(!r.ok) throw new Error(r.status); return r.json(); }

/* ───────────────────────── applica lingua ───────────────────────── */
function applyLang(){
  const t=T();
  document.documentElement.lang=LANG;
  document.querySelectorAll("#langsel button").forEach(b=>b.classList.toggle("on",b.dataset.l===LANG));
  $("subtitle").textContent=t.sub+" · "+POS.name.toUpperCase();
  $("q").placeholder=t.search; $("geoBtn").textContent=t.here;
  document.querySelector('#layersel [data-m="radar"]').textContent=t.lyR;
  document.querySelector('#layersel [data-m="sat"]').textContent=t.lyS;
  document.querySelector('#layersel [data-m="none"]').textContent=t.lyN;
  $("lg-q").textContent=t.lgQ; $("lg-a").textContent=t.lgA; $("lg-r").textContent=t.lgR;
  $("h-met").textContent=t.hMet; $("h-sis").textContent=t.hSis; $("h-aer").textContent=t.hAer;
  $("h-spc").textContent=t.hSpc; $("h-pc").textContent=t.hPc;
  $("k-feels").textContent=t.feels; $("k-wind").textContent=t.wind; $("k-hum").textContent=t.hum;
  $("k-rain").textContent=t.rain3; $("k-swind").textContent=t.swind; $("k-sdens").textContent=t.sdens;
  $("ft").textContent=t.ft;
}
document.querySelectorAll("#langsel button").forEach(b=>b.onclick=()=>{
  LANG=b.dataset.l; applyLang();
  loadMeteo(); loadSismi(); loadAerei(); loadSpace(); loadPC(); // ri-renderizza i testi dinamici
});

/* ───────────────────────── mappa ───────────────────────── */
function initMap(){
  map = L.map("map",{zoomControl:true}).setView([POS.lat,POS.lon], 8);
  L.tileLayer("https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png",
    {attribution:'&copy; OpenStreetMap &copy; CARTO', maxZoom:18}).addTo(map);
  quakeLayer = L.layerGroup().addTo(map);
  planeLayer = L.layerGroup().addTo(map);
  centerMarker = L.circleMarker([POS.lat,POS.lon],{radius:5,color:"#ffb454",weight:2,fillOpacity:.8}).addTo(map);
}
function setCenter(lat,lon,name){
  POS = {lat,lon,name};
  $("subtitle").textContent = T().sub+" · "+name.toUpperCase();
  centerMarker.setLatLng([lat,lon]);
  map.setView([lat,lon], 8);
  loadMeteo(); loadAerei(); loadSismi();
}

/* ───────────────────────── meteo ───────────────────────── */
async function loadMeteo(){
  try{
    const t=T();
    const u=`https://api.open-meteo.com/v1/forecast?latitude=${POS.lat}&longitude=${POS.lon}`+
      `&current=temperature_2m,apparent_temperature,relative_humidity_2m,wind_speed_10m,weather_code`+
      `&hourly=temperature_2m,precipitation_probability,weather_code&forecast_days=2&timezone=auto`;
    const d=await j(u), c=d.current;
    $("met-temp").innerHTML=Math.round(c.temperature_2m)+"<small> °C</small>";
    $("met-desc").textContent=t.wmo[c.weather_code]??"—";
    $("met-app").textContent=Math.round(c.apparent_temperature)+" °C";
    $("met-wind").textContent=Math.round(c.wind_speed_10m)+" km/h";
    $("met-hum").textContent=c.relative_humidity_2m+" %";
    const H=d.hourly, start=Math.max(0,H.time.findIndex(x=>new Date(x)>new Date()));
    let maxP3=0, html="";
    for(let i=start;i<start+8&&i<H.time.length;i++){
      const p=H.precipitation_probability[i]??0;
      if(i<start+3) maxP3=Math.max(maxP3,p);
      const hh=new Date(H.time[i]).getHours().toString().padStart(2,"0");
      html+=`<div class="row"><span class="mono">${hh}:00</span><span>${t.wmo[H.weather_code[i]]??""}</span>`+
            `<span class="mono">${Math.round(H.temperature_2m[i])}° · ${p}%</span></div>`;
    }
    $("met-hours").innerHTML=html;
    $("met-rain").textContent=maxP3+" %";
    stamp("t-met");
    lamp("L-met", maxP3>=60?"warn":"ok", maxP3>=60?t.lampRain:Math.round(c.temperature_2m)+"°");
  }catch(e){ $("met-desc").textContent=T().err; lamp("L-met","","n/d"); }
}
let wxMode="radar", wxPaths={radar:null,sat:null};
async function loadRadar(){
  try{
    const d=await j("https://api.rainviewer.com/public/weather-maps.json");
    const rf=d.radar&&d.radar.past;             if(rf&&rf.length) wxPaths.radar=rf[rf.length-1].path;
    const sf=d.satellite&&d.satellite.infrared; if(sf&&sf.length) wxPaths.sat=sf[sf.length-1].path;
    applyWx();
  }catch(e){}
}
function applyWx(){
  document.querySelectorAll("#layersel button").forEach(b=>b.classList.toggle("on",b.dataset.m===wxMode));
  const p = wxMode==="radar" ? wxPaths.radar : wxMode==="sat" ? wxPaths.sat : null;
  if(!p){ if(radarLayer){map.removeLayer(radarLayer);radarLayer=null;} return; }
  const style = wxMode==="radar" ? "/256/{z}/{x}/{y}/2/1_1.png" : "/256/{z}/{x}/{y}/0/0_0.png";
  const url=`https://tilecache.rainviewer.com${p}${style}`;
  if(radarLayer) radarLayer.setUrl(url);
  else radarLayer=L.tileLayer(url,{opacity:.55}).addTo(map);
}
document.querySelectorAll("#layersel button").forEach(b=>b.onclick=()=>{wxMode=b.dataset.m;applyWx();});

/* ───────────────────────── terremoti ───────────────────────── */
async function loadSismi(){
  try{
    const t=T();
    const from=new Date(Date.now()-7*864e5).toISOString().slice(0,19);
    const d=await j(`https://webservices.ingv.it/fdsnws/event/1/query?format=geojson&starttime=${from}&minmagnitude=2&orderby=time&limit=40`);
    quakeLayer.clearLayers();
    let html="", worst24=null;
    for(const f of d.features){
      const [lon,lat,depth]=f.geometry.coordinates, p=f.properties;
      const m=p.mag, tt=new Date(p.time), recent=(Date.now()-tt)<864e5;
      const dist=km(POS,{lat,lon});
      if(recent && dist<150 && (!worst24||m>worst24)) worst24=m;
      L.circleMarker([lat,lon],{radius:2+m*1.6,color:"#ff5d5d",weight:1.5,
        fillOpacity:recent?.5:.12,opacity:recent?1:.35})
        .bindPopup(`<b>M ${m.toFixed(1)}</b> — ${p.place}<br>${tt.toLocaleString()}<br>${t.depth} ${Math.round(depth)} km`)
        .addTo(quakeLayer);
      if(html.length<4000)
        html+=`<div class="row"><span class="mag">M ${m.toFixed(1)}</span><span style="flex:1">${p.place}</span>`+
              `<span class="dim mono">${tt.toLocaleString([],{day:"2-digit",month:"2-digit",hour:"2-digit",minute:"2-digit"})} · ${Math.round(dist)} km</span></div>`;
    }
    $("sis-list").innerHTML=html||`<div class="err">${t.noQuakes}</div>`;
    stamp("t-sis");
    lamp("L-sis", worst24>=3.5?"alert":worst24?"warn":"ok", worst24?("M "+worst24.toFixed(1)):t.lampQuiet);
  }catch(e){ $("sis-list").innerHTML=`<div class="err">${T().err}</div>`; lamp("L-sis","","n/d"); }
}

/* ───────────────────────── aerei segnalati ───────────────────────── */
function classifica(ac){
  const f=ac.dbFlags||0, cs=(ac.flight||"").trim(), reg=(ac.r||"").trim(), m=[];
  if(f&1) m.push("MIL");
  if(f&4) m.push("PIA");
  if(f&8) m.push("LADD");
  if(!cs&&!reg&&ac.alt_baro!=="ground") m.push("NO-ID");
  if((ac.hex||"").startsWith("~")) m.push("TIS-B");
  if(["7500","7600","7700"].includes(ac.squawk)) m.push("SQ "+ac.squawk);
  return m;
}
async function loadAerei(){
  try{
    const t=T();
    const nm=Math.min(250,Math.round(120/1.852));
    let d=null;
    for(const base of ["https://api.adsb.lol","https://api.airplanes.live"]){
      try{ d=await j(`${base}/v2/point/${POS.lat}/${POS.lon}/${nm}`); if(d&&d.ac) break; }catch(e){}
    }
    if(!d||!d.ac) throw new Error("no data");
    planeLayer.clearLayers();
    const hits=[];
    for(const ac of d.ac){
      if(ac.lat==null) continue;
      const m=classifica(ac);
      if(!m.length) continue;
      hits.push({ac,m,dist:km(POS,{lat:ac.lat,lon:ac.lon})});
      const mil=m.some(x=>x==="MIL"||x.startsWith("SQ"));
      L.circleMarker([ac.lat,ac.lon],{radius:6,color:mil?"#ff5d5d":"#ffb454",weight:2,fillOpacity:.7})
        .bindPopup(`<b>${(ac.flight||"").trim()||ac.r||ac.hex}</b> — ${m.join(", ")}<br>${ac.t||"—"}<br>`+
          `<a href="https://globe.adsb.lol/?icao=${(ac.hex||"").replace("~","")}" target="_blank" rel="noopener">${t.live}</a>`)
        .addTo(planeLayer);
    }
    hits.sort((a,b)=>a.dist-b.dist);
    $("aer-sum").textContent=t.aerSum(d.ac.length,hits.length);
    $("aer-list").innerHTML=hits.slice(0,8).map(h=>{
      const a=h.ac, cs=(a.flight||"").trim()||a.r||a.hex.toUpperCase();
      const alt=a.alt_baro==="ground"?"⏚":(typeof a.alt_baro==="number"?Math.round(a.alt_baro*0.3048)+" m":"");
      return `<a class="row" target="_blank" rel="noopener" href="https://globe.adsb.lol/?icao=${(a.hex||"").replace("~","")}">`+
             `<span class="mono" style="font-weight:700">${cs} ↗</span>`+
             `<span class="tag">${h.m.join(" · ")}</span>`+
             `<span class="dim mono">${h.dist.toFixed(0)} km · ${alt}</span></a>`;
    }).join("");
    stamp("t-aer");
    lamp("L-aer", hits.some(h=>h.m.some(x=>x==="MIL"||x.startsWith("SQ")))?"alert":(hits.length?"warn":"ok"),
         hits.length? t.lampFlag(hits.length):t.lampClean);
  }catch(e){ $("aer-sum").textContent=T().err; lamp("L-aer","","n/d"); }
}

/* ───────────────────────── space weather ───────────────────────── */
async function loadSpace(){
  const t=T();
  try{
    const kp=await j("https://services.swpc.noaa.gov/products/noaa-planetary-k-index.json");
    const rows=kp.slice(1);
    const last=rows[rows.length-1], kpNow=parseFloat(last[1]);
    $("spc-kp").textContent="Kp "+kpNow.toFixed(1);
    $("spc-desc").textContent = t.kp[kpNow>=7?3:kpNow>=5?2:kpNow>=4?1:0];
    const day=rows.filter(r=>Date.now()-new Date(r[0]+"Z")<864e5);
    const step=Math.max(1,Math.floor(day.length/24));
    $("kpbars").innerHTML=day.filter((_,i)=>i%step===0).map(r=>{
      const v=parseFloat(r[1]);
      return `<div class="${v>=5?"hot":""}" style="height:${Math.max(4,v/9*100)}%" title="Kp ${v}"></div>`;
    }).join("");
    lamp("L-spc", kpNow>=5?"alert":kpNow>=4?"warn":"ok", "Kp "+kpNow.toFixed(1));
  }catch(e){ $("spc-desc").textContent=t.err; lamp("L-spc","","n/d"); }
  try{
    const pl=await j("https://services.swpc.noaa.gov/products/solar-wind/plasma-1-day.json");
    const v=pl[pl.length-1];
    $("spc-wind").textContent=Math.round(parseFloat(v[2]))+" km/s";
    $("spc-dens").textContent=parseFloat(v[1]).toFixed(1)+" p/cm³";
  }catch(e){}
  stamp("t-spc");
}

/* ───────────────────────── allerte protezione civile ───────────────────────── */
async function loadPC(){
  const t=T();
  const base="https://raw.githubusercontent.com/pcm-dpc/DPC-Bollettini-Criticita-Idrogeologica-Idraulica/master/files";
  const days=[0,1].map(n=>{const d=new Date(Date.now()-n*864e5);
    return d.getFullYear()+String(d.getMonth()+1).padStart(2,"0")+String(d.getDate()).padStart(2,"0");});
  for(const day of days){
    for(const kind of ["today","tomorrow"]){
      try{
        const d=await j(`${base}/geojson/${day}_1530_${kind}.geojson`);
        const feats=d.features||[];
        let worst="verde", zone=[];
        for(const f of feats){
          const p=f.properties||{}, name=p["Nome zona"]||p.nome_zona||p.zone||"";
          const info=JSON.stringify(p).toLowerCase();
          let lvl = info.includes("rossa")?"rossa":info.includes("arancione")?"arancione":info.includes("gialla")?"gialla":"verde";
          if(lvl!=="verde") zone.push({name,lvl});
          const rank={verde:0,gialla:1,arancione:2,rossa:3};
          if(rank[lvl]>rank[worst]) worst=lvl;
        }
        const dd=`${day.slice(6)}/${day.slice(4,6)}`;
        $("pc-body").innerHTML = worst==="verde"
          ? `${t.pcOf} ${dd} (${kind==="today"?t.today:t.tomorrow}): <b style="color:var(--ok)">${t.pcNone}</b>.`
          : `${t.pcOf} ${dd}: ${t.pcMax} <b style="color:${worst==="rossa"?"var(--seismic)":"var(--amber)"}">${worst}</b>`+
            ` — ${zone.length} ${t.pcZones}. <a href="https://mappe.protezionecivile.gov.it/it/mappe-e-dashboards-rischi/bollettino-di-criticita/" target="_blank" rel="noopener">${t.pcLink}</a>`;
        stamp("t-pc");
        lamp("L-pc", worst==="rossa"?"alert":worst==="verde"?"ok":"warn", worst);
        return;
      }catch(e){/* provo il file successivo */}
    }
  }
  $("pc-body").innerHTML=`${t.pcNA} <a href="https://mappe.protezionecivile.gov.it/it/mappe-e-dashboards-rischi/bollettino-di-criticita/" target="_blank" rel="noopener">${t.pcOff}</a>`;
  lamp("L-pc","","n/d"); stamp("t-pc");
}

/* ───────────────────────── posizione ───────────────────────── */
$("geoBtn").onclick=()=>{
  navigator.geolocation?.getCurrentPosition(
    p=>setCenter(p.coords.latitude,p.coords.longitude,T().myArea),
    ()=>alert(T().geoErr));
};
$("q").addEventListener("keydown",async e=>{
  if(e.key!=="Enter") return;
  const q=e.target.value.trim(); if(!q) return;
  try{
    const d=await j(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(q)}&count=1&language=${LANG}`);
    if(d.results&&d.results.length){const r=d.results[0];setCenter(r.latitude,r.longitude,r.name);e.target.blur();}
    else alert(T().notFound);
  }catch(err){alert(T().searchErr);}
});

/* ───────────────────────── avvio + cicli ───────────────────────── */
function schedule(fn,sec,key){ fn(); timers[key]=setInterval(()=>{ if(!document.hidden) fn(); },sec*1000); }
initMap();
applyLang();
schedule(loadMeteo, REFRESH.met, "met");
schedule(loadRadar, REFRESH.radar,"radar");
schedule(loadSismi, REFRESH.sis, "sis");
schedule(loadAerei, REFRESH.aer, "aer");
schedule(loadSpace, REFRESH.spc, "spc");
schedule(loadPC,    REFRESH.pc,  "pc");
</script>

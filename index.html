<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0a0e14">
<title>Argus — the world in real time</title>
<meta name="description" content="Argus: earthquakes, weather, rain radar, satellite, space weather and flagged air traffic. The world in real time, on one page.">
<link rel="canonical" href="https://gillis-glitch.github.io/argus/">
<meta property="og:title" content="Argus — the world in real time">
<meta property="og:description" content="Live map with rain radar, earthquakes, flagged air traffic, space weather and station boards for 4 rail networks. Free, no ads, no tracking.">
<meta property="og:url" content="https://gillis-glitch.github.io/argus/">
<meta property="og:type" content="website">
<meta property="og:site_name" content="Argus">
<meta name="twitter:card" content="summary">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<style>
  :root{
    --bg:#0a0e14; --panel:#111823; --panel2:#0d1420; --line:#1d2a3a;
    --amber:#ffb454; --seismic:#ff5d5d; --meteo:#55c8ff; --space:#b48cff;
    --ok:#69d98c; --txt:#d9e2ec; --muted:#7e8c9d;
    --mono:"SF Mono",ui-monospace,"Cascadia Mono","Roboto Mono",Menlo,monospace;
    --sans:-apple-system,"Segoe UI",Roboto,"Helvetica Neue",sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:var(--bg);color:var(--txt);font-family:var(--sans)}
  body{max-width:1100px;margin:0 auto;padding:0 12px calc(24px + env(safe-area-inset-bottom))}
  a{color:var(--meteo)}

  header{padding:14px 2px 10px}
  .toprow{display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
  h1{font-size:20px;font-weight:800;letter-spacing:.1em;text-transform:uppercase}
  h1 small{display:block;font-family:var(--mono);font-size:10.5px;font-weight:400;color:var(--muted);letter-spacing:.14em;margin-top:3px}
  .selrow{display:flex;gap:6px;flex-wrap:wrap}
  .selrow button{background:var(--panel);border:1px solid var(--line);border-radius:8px;color:var(--muted);padding:7px 10px;font-size:12px;font-family:var(--mono);cursor:pointer}
  .selrow button.on{color:var(--meteo);border-color:var(--meteo)}
  .hubpin{background:none;border:none;font-size:17px;line-height:22px;text-align:center}
  #trn-hubs button{max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

  #annunciator{display:grid;grid-template-columns:repeat(6,1fr);gap:6px;margin-top:12px}
  .lamp{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:8px 4px;text-align:center;cursor:pointer}
  .lamp b{display:block;font-family:var(--mono);font-size:10px;letter-spacing:.1em;color:var(--muted)}
  .lamp i{display:block;width:8px;height:8px;border-radius:50%;margin:6px auto 0;background:var(--muted);font-style:normal}
  .lamp span{display:block;font-family:var(--mono);font-size:11px;margin-top:5px;min-height:14px}
  .lamp.ok i{background:var(--ok)}
  .lamp.warn i{background:var(--amber);box-shadow:0 0 10px var(--amber);animation:blink 1.6s infinite}
  .lamp.alert i{background:var(--seismic);box-shadow:0 0 10px var(--seismic);animation:blink 1s infinite}
  @keyframes blink{50%{opacity:.35}}

  #locbar{display:flex;gap:8px;margin-top:12px}
  #locbar input{flex:1;background:var(--panel);border:1px solid var(--line);border-radius:8px;color:var(--txt);padding:10px 12px;font-size:14px;font-family:var(--sans)}
  #locbar button{background:var(--panel);border:1px solid var(--line);border-radius:8px;color:var(--txt);padding:0 14px;font-size:13px;cursor:pointer;white-space:nowrap}
  #locbar button:active{border-color:var(--amber)}

  #map{height:46vh;min-height:300px;border:1px solid var(--line);border-radius:12px;margin-top:12px;background:#060a10}
  .leaflet-container{font-family:var(--mono);background:#060a10}
  #layersel{margin:8px 2px 0}
  .maplegend{font-family:var(--mono);font-size:10px;color:var(--muted);display:flex;gap:14px;margin:8px 2px 0;flex-wrap:wrap}
  .maplegend i{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:4px;font-style:normal}

  #grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:14px}
  @media(max-width:720px){#grid{grid-template-columns:1fr}}
  section{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:14px;border-top:2px solid var(--line)}
  section.s-met{border-top-color:var(--meteo)}
  section.s-sis{border-top-color:var(--seismic)}
  section.s-spc{border-top-color:var(--space)}
  section.s-aer{border-top-color:var(--amber)}
  section.s-pc {border-top-color:var(--ok)}
  section.s-trn{border-top-color:#4fd8c4}
  #p-trn select,#p-trn input{width:100%;background:var(--panel2);border:1px solid var(--line);border-radius:8px;color:var(--txt);padding:9px 10px;font-size:13px;margin-top:8px}
  section h2{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);display:flex;justify-content:space-between;align-items:baseline;gap:8px}
  section h2 time{font-family:var(--mono);font-size:10px;text-transform:none;letter-spacing:0}
  .big{font-family:var(--mono);font-size:34px;font-weight:600;margin-top:8px}
  .big small{font-size:14px;color:var(--muted);font-weight:400}
  .sub{font-size:13px;color:var(--muted);margin-top:2px}
  .kv{display:flex;gap:16px;margin-top:10px;flex-wrap:wrap}
  .kv div b{display:block;font-family:var(--mono);font-size:15px}
  .kv div span{font-size:10.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}
  .list{margin-top:10px}
  .row{display:flex;justify-content:space-between;gap:8px;padding:7px 0;border-bottom:1px solid var(--line);font-size:13px;align-items:baseline}
  a.row{text-decoration:none;color:inherit}
  a.row:active{background:var(--panel2)}
  .row:last-child{border-bottom:none}
  .row .mono{font-family:var(--mono);font-size:12px}
  .row .dim{color:var(--muted);font-size:11.5px}
  .mag{font-family:var(--mono);font-weight:700;color:var(--seismic);min-width:38px}
  .err{color:var(--muted);font-size:12.5px;margin-top:10px}
  .tag{font-size:9.5px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:2px 6px;border-radius:4px;background:rgba(255,180,84,.15);color:var(--amber);white-space:nowrap}
  #kpbars{display:flex;align-items:flex-end;gap:2px;height:44px;margin-top:10px}
  #kpbars div{flex:1;background:var(--space);opacity:.5;border-radius:2px 2px 0 0;min-height:2px}
  #kpbars div.hot{opacity:1;background:var(--seismic)}

  footer{margin-top:18px;font-size:11px;color:var(--muted);line-height:1.7;text-align:center}
  @media(prefers-reduced-motion:reduce){.lamp i{animation:none!important}}
</style>
</head>
<body>

<header>
  <div class="toprow">
    <h1>Argus<small id="subtitle">—</small></h1>
    <div class="selrow" id="langsel">
      <button data-l="it">IT</button><button data-l="en">EN</button><button data-l="es">ES</button><button data-l="ru">РУ</button><button data-l="zh">中文</button>
    </div>
  </div>
  <div id="annunciator">
    <div class="lamp" id="L-met" onclick="go('p-met')"><b>MET</b><i></i><span>—</span></div>
    <div class="lamp" id="L-trn" onclick="go('p-trn')"><b>TRN</b><i></i><span>—</span></div>
    <div class="lamp" id="L-sis" onclick="go('p-sis')"><b>SIS</b><i></i><span>—</span></div>
    <div class="lamp" id="L-aer" onclick="go('p-aer')"><b>AER</b><i></i><span>—</span></div>
    <div class="lamp" id="L-spc" onclick="go('p-spc')"><b>SPC</b><i></i><span>—</span></div>
    <div class="lamp" id="L-pc"  onclick="go('p-pc')"><b>ALL</b><i></i><span>—</span></div>
  </div>
  <div id="locbar">
    <input id="q" type="text" placeholder="" enterkeyhint="search">
    <button id="geoBtn"></button>
  </div>
</header>

<div id="map" role="application" aria-label="Live map"></div>
<div class="selrow" id="layersel">
  <button data-m="radar" class="on"></button>
  <button data-m="sat"></button>
  <button data-m="none"></button>
</div>
<div class="maplegend">
  <span><i style="background:var(--seismic)"></i><span id="lg-q"></span></span>
  <span><i style="background:var(--amber)"></i><span id="lg-a"></span></span>
  <span><i style="background:var(--meteo)"></i><span id="lg-r"></span></span>
</div>

<div id="grid">
  <section class="s-met" id="p-met">
    <h2><span id="h-met"></span> <time id="t-met"></time></h2>
    <div class="big" id="met-temp">—<small> °C</small></div>
    <div class="sub" id="met-desc">…</div>
    <div class="kv">
      <div><b id="met-app">—</b><span id="k-feels"></span></div>
      <div><b id="met-wind">—</b><span id="k-wind"></span></div>
      <div><b id="met-hum">—</b><span id="k-hum"></span></div>
      <div><b id="met-rain">—</b><span id="k-rain"></span></div>
    </div>
    <div class="list" id="met-hours"></div>
  </section>

  <section class="s-trn" id="p-trn">
    <h2><span id="h-trn"></span> <time id="t-trn"></time></h2>
    <div class="selrow" style="margin-top:8px">
      <span class="sub" id="trn-net" style="align-self:center">🇮🇹</span>
      <button id="trn-mode" style="margin-left:auto"></button>
    </div>
    <div class="selrow" id="trn-modes" style="display:none;margin-top:8px">
      <button data-mm="all" class="on"></button>
      <button data-mm="rail">🚆</button>
      <button data-mm="bus">🚌</button>
      <button data-mm="ferry">⛴️</button>
    </div>
    <input id="trn-q" type="text" list="it-stations" value="Bologna Centrale" enterkeyhint="search">
    <datalist id="it-stations"></datalist>
    <div class="selrow" id="trn-hubs" style="display:none;margin-top:8px"></div>
    <div class="sub" id="trn-sub" style="margin-top:8px">…</div>
    <div class="list" id="trn-list"></div>
  </section>

  <section class="s-sis" id="p-sis">
    <h2><span id="h-sis"></span> <time id="t-sis"></time></h2>
    <div class="list" id="sis-list"><div class="err">…</div></div>
  </section>

  <section class="s-aer" id="p-aer">
    <h2><span id="h-aer"></span> <time id="t-aer"></time></h2>
    <div class="sub" id="aer-sum">…</div>
    <div class="list" id="aer-list"></div>
  </section>

  <section class="s-spc" id="p-spc">
    <h2><span id="h-spc"></span> <time id="t-spc"></time></h2>
    <div class="big" id="spc-kp">Kp —</div>
    <div class="sub" id="spc-desc">…</div>
    <div id="kpbars"></div>
    <div class="kv">
      <div><b id="spc-wind">—</b><span id="k-swind"></span></div>
      <div><b id="spc-dens">—</b><span id="k-sdens"></span></div>
    </div>
  </section>

  <section class="s-pc" id="p-pc" style="grid-column:1/-1">
    <h2><span id="h-pc"></span> <time id="t-pc"></time></h2>
    <div class="sub" id="pc-body">…</div>
  </section>
</div>

<footer>
  <a href="https://open-meteo.com" rel="noopener">Open-Meteo</a> ·
  <a href="https://www.rainviewer.com" rel="noopener">RainViewer</a> ·
  <a href="https://terremoti.ingv.it" rel="noopener">INGV</a> ·
  <a href="https://www.swpc.noaa.gov" rel="noopener">NOAA SWPC</a> ·
  <a href="https://adsb.lol" rel="noopener">adsb.lol</a> ·
  <a href="https://www.protezionecivile.gov.it" rel="noopener">Protezione Civile</a><br>
  <span id="ft"></span>
</footer>

const km = (a,b)=>{const r=Math.PI/180,dLa=(b.lat-a.lat)*r,dLo=(b.lon-a.lon)*r,
  h=Math.sin(dLa/2)**2+Math.cos(a.lat*r)*Math.cos(b.lat*r)*Math.sin(dLo/2)**2;
  return 6371*2*Math.asin(Math.sqrt(h));};

async function loadMeteo(){
  try{
    const t=T();
    const u=`https://api.open-meteo.com/v1/forecast?latitude=${POS.lat}&longitude=${POS.lon}`+
      `&current=temperature_2m,apparent_temperature,relative_humidity_2m,wind_speed_10m,weather_code`+
      `&hourly=temperature_2m,precipitation_probability,weather_code&forecast_days=2&timezone=auto`;
    const d=await j(u), c=d.current;
    $("met-temp").innerHTML=Math.round(c.temperature_2m)+"<small> °C</small>";
    $("met-desc").textContent=t.wmo[c.weather_code]??"—";
    $("met-app").textContent=Math.round(c.apparent_temperature)+" °C";
    $("met-wind").textContent=Math.round(c.wind_speed_10m)+" km/h";
    $("met-hum").textContent=c.relative_humidity_2m+" %";
    const H=d.hourly, start=Math.max(0,H.time.findIndex(x=>new Date(x)>new Date()));
    let maxP3=0, html="";
    for(let i=start;i<start+8&&i<H.time.length;i++){
      const p=H.precipitation_probability[i]??0;
      if(i<start+3) maxP3=Math.max(maxP3,p);
      const hh=new Date(H.time[i]).getHours().toString().padStart(2,"0");
      html+=`<div class="row"><span class="mono">${hh}:00</span><span>${t.wmo[H.weather_code[i]]??""}</span>`+
            `<span class="mono">${Math.round(H.temperature_2m[i])}° · ${p}%</span></div>`;
    }
    $("met-hours").innerHTML=html;
    $("met-rain").textContent=maxP3+" %";
    stamp("t-met");
    lamp("L-met", maxP3>=60?"warn":"ok", maxP3>=60?t.lampRain:Math.round(c.temperature_2m)+"°");
  }catch(e){ $("met-desc").textContent=T().err; lamp("L-met","","n/d"); }
}

function classifica(ac){
  const f=ac.dbFlags||0, cs=(ac.flight||"").trim(), reg=(ac.r||"").trim(), m=[];
  if(f&1) m.push("MIL");
  if(f&4) m.push("PIA");
  if(f&8) m.push("LADD");
  if(!cs&&!reg&&ac.alt_baro!=="ground") m.push("NO-ID");
  if((ac.hex||"").startsWith("~")) m.push("TIS-B");
  if(["7500","7600","7700"].includes(ac.squawk)) m.push("SQ "+ac.squawk);
  return m;
}
async function loadAerei(){
  try{
    const t=T();
    const nm=Math.min(250,Math.round(120/1.852));
    let d=null;
    for(const base of ["https://api.adsb.lol","https://api.airplanes.live"]){
      try{ d=await j(`${base}/v2/point/${POS.lat}/${POS.lon}/${nm}`); if(d&&d.ac) break; }catch(e){}
    }
    if(!d||!d.ac) throw new Error("no data");
    planeLayer.clearLayers();
    const hits=[];
    for(const ac of d.ac){
      if(ac.lat==null) continue;
      const m=classifica(ac);
      if(!m.length) continue;
      hits.push({ac,m,dist:km(POS,{lat:ac.lat,lon:ac.lon})});
      const mil=m.some(x=>x==="MIL"||x.startsWith("SQ"));
      L.circleMarker([ac.lat,ac.lon],{radius:6,color:mil?"#ff5d5d":"#ffb454",weight:2,fillOpacity:.7})
        .bindPopup(`<b>${(ac.flight||"").trim()||ac.r||ac.hex}</b> — ${m.join(", ")}<br>${ac.t||"—"}<br>`+
          `<a href="https://globe.adsb.lol/?icao=${(ac.hex||"").replace("~","")}" target="_blank" rel="noopener">${t.live}</a>`)
        .addTo(planeLayer);
    }
    hits.sort((a,b)=>a.dist-b.dist);
    $("aer-sum").textContent=t.aerSum(d.ac.length,hits.length);
    $("aer-list").innerHTML=hits.slice(0,8).map(h=>{
      const a=h.ac, cs=(a.flight||"").trim()||a.r||a.hex.toUpperCase();
      const alt=a.alt_baro==="ground"?"⏚":(typeof a.alt_baro==="number"?Math.round(a.alt_baro*0.3048)+" m":"");
      return `<a class="row" target="_blank" rel="noopener" href="https://globe.adsb.lol/?icao=${(a.hex||"").replace("~","")}">`+
             `<span class="mono" style="font-weight:700">${cs} ↗</span>`+
             `<span class="tag">${h.m.join(" · ")}</span>`+
             `<span class="dim mono">${h.dist.toFixed(0)} km · ${alt}</span></a>`;
    }).join("");
    stamp("t-aer");
    lamp("L-aer", hits.some(h=>h.m.some(x=>x==="MIL"||x.startsWith("SQ")))?"alert":(hits.length?"warn":"ok"),
         hits.length? t.lampFlag(hits.length):t.lampClean);
  }catch(e){ $("aer-sum").textContent=T().err; lamp("L-aer","","n/d"); }
}

/* ───────────────────────── allerte protezione civile ───────────────────────── */
async function loadPC(){
  const t=T();
  const base="https://raw.githubusercontent.com/pcm-dpc/DPC-Bollettini-Criticita-Idrogeologica-Idraulica/master/files";
  const days=[0,1].map(n=>{const d=new Date(Date.now()-n*864e5);
    return d.getFullYear()+String(d.getMonth()+1).padStart(2,"0")+String(d.getDate()).padStart(2,"0");});
  for(const day of days){
    for(const kind of ["today","tomorrow"]){
      try{
        const d=await j(`${base}/geojson/${day}_1530_${kind}.geojson`);
        const feats=d.features||[];
        let worst="verde", zone=[];
        for(const f of feats){
          const p=f.properties||{}, name=p["Nome zona"]||p.nome_zona||p.zone||"";
          const info=JSON.stringify(p).toLowerCase();
          let lvl = info.includes("rossa")?"rossa":info.includes("arancione")?"arancione":info.includes("gialla")?"gialla":"verde";
          if(lvl!=="verde") zone.push({name,lvl});
          const rank={verde:0,gialla:1,arancione:2,rossa:3};
          if(rank[lvl]>rank[worst]) worst=lvl;
        }
        const dd=`${day.slice(6)}/${day.slice(4,6)}`;
        $("pc-body").innerHTML = worst==="verde"
          ? `${t.pcOf} ${dd} (${kind==="today"?t.today:t.tomorrow}): <b style="color:var(--ok)">${t.pcNone}</b>.`
          : `${t.pcOf} ${dd}: ${t.pcMax} <b style="color:${worst==="rossa"?"var(--seismic)":"var(--amber)"}">${worst}</b>`+
            ` — ${zone.length} ${t.pcZones}. <a href="https://mappe.protezionecivile.gov.it/it/mappe-e-dashboards-rischi/bollettino-di-criticita/" target="_blank" rel="noopener">${t.pcLink}</a>`;
        stamp("t-pc");
        lamp("L-pc", worst==="rossa"?"alert":worst==="verde"?"ok":"warn", worst);
        return;
      }catch(e){/* provo il file successivo */}
    }
  }
  $("pc-body").innerHTML=`${t.pcNA} <a href="https://mappe.protezionecivile.gov.it/it/mappe-e-dashboards-rischi/bollettino-di-criticita/" target="_blank" rel="noopener">${t.pcOff}</a>`;
  lamp("L-pc","","n/d"); stamp("t-pc");
}

/* normalizzazione: maiuscole, via accenti/apostrofi — "forlì"≡"FORLI", "sant'anna"≡"SANT ANNA" */
function norm(s){return s.toUpperCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/['’.]/g," ").replace(/\s+/g," ").trim();}
/* tra più candidate vince la stazione principale (Centrale), poi il nome più corto */
function pickBest(list){
  if(!list.length) return null;
  return list.find(e=>/\bCENTRALE\b|\bC LE\b/.test(norm(e.name)))||list.slice().sort((a,b)=>a.name.length-b.name.length)[0];
}
function itResolve(txt){
  const u=norm(txt); if(!u||!IT_IDX.length) return null;
  const ex=IT_IDX.find(e=>e.k===u); if(ex) return {name:ex.name,id:ex.id,tier:0};
  const b1=pickBest(IT_IDX.filter(e=>e.k.startsWith(u))); if(b1) return {name:b1.name,id:b1.id,tier:1};
  const b2=pickBest(IT_IDX.filter(e=>e.k.includes(u)));   return b2?{name:b2.name,id:b2.id,tier:2}:null;
}
async function fiEnsure(){
  if(FI_MAP) return;
  const d=await j("https://rata.digitraffic.fi/api/v1/metadata/stations");
  FI_MAP={}; FI_NAMES={};
  for(const s of d){
    if(!s.passengerTraffic) continue;
    const nome=s.stationName.replace(/ asema$/i,"");
    FI_MAP[norm(nome)]=s.stationShortCode;
    FI_NAMES[s.stationShortCode]=nome;
  }
}
function fiResolve(u){
  if(FI_MAP[u]) return FI_MAP[u];
  const keys=Object.keys(FI_MAP);
  const k=keys.find(x=>x.startsWith(u))||keys.find(x=>x.includes(u));
  return k?FI_MAP[k]:null;
}

/* campo unico: capisce da solo a quale rete appartiene la stazione */
async function trnSearch(){
  const t=T(), grezzo=$("trn-q").value.trim();
  if(!grezzo) return;
  const eso=EXO[norm(grezzo)];                             // esonimi: zurigo→Zürich, rome→Roma Termini…
  const q=eso||grezzo;
  $("trn-sub").textContent="…";
  const it=itResolve(q);                                   // 1) Italia
  const sogliaIT=eso?1:2;                                  // con esonimo l'Italia vince solo per nome esatto
  if(it&&it.tier<sogliaIT){ trn.net="it"; trn.name=it.name; trn.id=it.id; $("trn-q").value=it.name; return loadTreni(); }
  try{                                                     // 2) Svizzera (ricerca fuzzy dedicata)
    const loc=await j(`https://transport.opendata.ch/v1/locations?query=${encodeURIComponent(q)}&type=station`);
    const st=(loc.stations||[]).find(s=>s&&s.id);
    if(st){
      const d=await j(`https://transport.opendata.ch/v1/stationboard?id=${encodeURIComponent(st.id)}&limit=10&type=departure`);
      if(d.stationboard&&d.stationboard.length){ trn.net="ch"; trn.name=(d.station&&d.station.name)||st.name; $("trn-q").value=trn.name; return loadTreni(); }
    }
  }catch(e){}
  try{                                                     // 3) Belgio
    const d=await j(`https://api.irail.be/liveboard/?station=${encodeURIComponent(q)}&format=json&lang=en&arrdep=departure`);
    if(d.departures&&d.departures.departure&&d.departures.departure.length){ trn.net="be"; trn.name=(d.stationinfo&&d.stationinfo.name)||q; return loadTreni(); }
  }catch(e){}
  try{                                                     // 4) Finlandia
    await fiEnsure();
    const code=fiResolve(norm(q));
    if(code){ trn.net="fi"; trn.id=code; trn.name=FI_NAMES[code]; $("trn-q").value=FI_NAMES[code]; return loadTreni(); }
  }catch(e){}
  if(it&&!eso){ trn.net="it"; trn.name=it.name; trn.id=it.id; $("trn-q").value=it.name; return loadTreni(); } // ripiego italiano (mai per gli esonimi)
  try{                                                     // 5) Mondo — Transitous/MOTIS, copre tutto il resto (GTFS/GTFS-RT globale)
    const g=await j(`${TRANSITOUS}/api/v1/geocode?text=${encodeURIComponent(q)}&type=STOP&language=${LANG}`);
    const m=(Array.isArray(g)?g:[]).find(x=>x&&x.id);   // geocode è già ordinato per score
    if(m){ trn.net="wo"; trn.hubs=[]; trn.id=m.id; trn.name=m.name; $("trn-q").value=m.name; return loadTreni(); }
  }catch(e){}
  $("trn-list").innerHTML=`<div class="err">${t.noNet}</div>`;
  $("trn-sub").textContent="—"; lamp("L-trn","","n/d");
}

async function loadTreni(){
  const t=T(), L=$("trn-list"), S=$("trn-sub");
  try{
    let rows=[], link="";
    if(trn.net==="it"){
      const arr=trn.mode==="arr";
      link=`https://iechub.rfi.it/ArriviPartenze/ArrivalsDepartures/Monitor?placeId=${trn.id}&arrivals=${arr}`;
      const r=await fetch(`${WORKER}/rfi/Monitor?placeId=${trn.id}&arrivals=${arr}`,{cache:"no-store"});
      if(!r.ok) throw new Error(r.status);
      const doc=new DOMParser().parseFromString(await r.text(),"text/html");
      for(const row of doc.querySelectorAll("tr")){
        const c=[...row.querySelectorAll("td")].map(x=>x.textContent.replace(/\s+/g," ").trim());
        const i=c.findIndex(x=>/^\d{1,2}:\d{2}$/.test(x));
        if(i<0) continue;
        const raw=c[i+1]||"";
        rows.push({num:c[i-2]||"",dest:c[i-1]||"",time:c[i],
          dly:parseInt((raw.match(/\d+/)||[0])[0],10)||0,raw,plat:c[i+2]||""});
      }
    }else if(trn.net==="ch"){
      link=`https://fahrplan.search.ch/${encodeURIComponent(trn.name)}`;
      const d=await j(`https://transport.opendata.ch/v1/stationboard?station=${encodeURIComponent(trn.name)}&limit=10&type=${trn.mode==="arr"?"arrival":"departure"}`);
      rows=(d.stationboard||[]).map(e=>({
        num:(e.category||"")+(e.number||""), dest:e.to||"",
        time:new Date(e.stop.departure||e.stop.arrival).toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"}),
        dly:e.stop.delay||0, raw:"", plat:e.stop.platform||""}));
    }else if(trn.net==="be"){
      link="https://www.belgiantrain.be/en/travel-info/current/search-by-station";
      const d=await j(`https://api.irail.be/liveboard/?station=${encodeURIComponent(trn.name)}&format=json&lang=en&arrdep=${trn.mode==="arr"?"arrival":"departure"}`);
      const list=trn.mode==="arr"?(d.arrivals&&d.arrivals.arrival):(d.departures&&d.departures.departure);
      rows=(list||[]).map(e=>({
        num:(e.vehicleinfo&&e.vehicleinfo.shortname)||"", dest:e.station||"",
        time:new Date((+e.time)*1000).toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"}),
        dly:Math.round((+e.delay||0)/60), raw:"", plat:e.platform&&e.platform!=="?"?e.platform:""}));
    }else if(trn.net==="fi"){ /* fi */
      link="https://www.vr.fi/en";
      const dep=trn.mode!=="arr";
      const d=await j(`https://rata.digitraffic.fi/api/v1/live-trains/station/${trn.id}?arrived_trains=0&departed_trains=0&arriving_trains=${dep?0:15}&departing_trains=${dep?15:0}&include_nonstopping=false`);
      const adesso=Date.now();
      for(const tr2 of (Array.isArray(d)?d:[])){
        const tt=tr2.timeTableRows||[];
        const my=tt.find(r2=>r2.stationShortCode===trn.id&&r2.type===(dep?"DEPARTURE":"ARRIVAL"));
        if(!my) continue;
        const quando=new Date(my.liveEstimateTime||my.scheduledTime).getTime();
        if(quando<adesso-5*60000) continue;
        const capo=dep?tt[tt.length-1]:tt[0];
        rows.push({num:(tr2.trainType||"")+(tr2.trainNumber||""),
          dest:(FI_NAMES&&FI_NAMES[capo.stationShortCode])||capo.stationShortCode,
          time:new Date(my.scheduledTime).toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"}),
          dly:my.differenceInMinutes||0, raw:my.cancelled?"CANC":"",
          plat:my.commercialTrack||"", _ts:new Date(my.scheduledTime).getTime()});
      }
      rows.sort((a,b)=>a._ts-b._ts);
    }else{ /* wo — Transitous/MOTIS, tabellone di qualunque stazione al mondo */
      const arr=trn.mode==="arr";
      const modeQ=MM[trn.mm]?`&mode=${MM[trn.mm]}`:"";
      const d=await j(`${TRANSITOUS}/api/v6/stoptimes?stopId=${encodeURIComponent(trn.id)}&n=10&arriveBy=${arr}${modeQ}&language=${LANG}`);
      rows=((d&&d.stopTimes)||[]).map(s=>{
        const p=s.place||{};
        const iso=arr?(p.arrival||p.scheduledArrival):(p.departure||p.scheduledDeparture);
        const sch=arr?p.scheduledArrival:p.scheduledDeparture;
        return {num:s.routeShortName||s.displayName||"",
                dest:s.headsign||(s.tripTo&&s.tripTo.name)||"",
                time:iso?new Date(iso).toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"}):"",
                dly:(iso&&sch)?Math.round((new Date(iso)-new Date(sch))/60000):0,
                raw:s.cancelled?"CANC":"", plat:p.track||p.scheduledTrack||""};
      });
    }
    rows=rows.slice(0,10);
    $("trn-modes").style.display = trn.net==="wo" ? "flex" : "none";
    const HB=$("trn-hubs");
    if(trn.net==="wo" && trn.hubs.length>1){
      HB.style.display="flex";
      HB.innerHTML=trn.hubs.map((h,i)=>`<button data-hi="${i}"${h.id===trn.id?' class="on"':''} title="${(h.name||'').replace(/"/g,'&quot;')}">${(h.name||'').replace(/</g,'&lt;')}</button>`).join("");
      HB.querySelectorAll("button").forEach(b=>b.onclick=()=>{const h=trn.hubs[+b.dataset.hi]; trn.id=h.id; trn.name=h.name; $("trn-q").value=h.name; loadTreni();});
    } else HB.style.display="none";
    $("trn-net").textContent=NET_FLAG[trn.net]||"";
    S.innerHTML=`${NET_FLAG[trn.net]||""} ${trn.name}`+(link?` · <a href="${link}" target="_blank" rel="noopener">${t.trnLink}</a>`:"");
    L.innerHTML=rows.map(r=>{
      const canc=/canc|soppr/i.test(r.raw);
      const col=canc||r.dly>=15?"var(--seismic)":r.dly>=5?"var(--amber)":"var(--ok)";
      const dt=canc?r.raw:(r.dly?"+"+r.dly+"′":t.onTime);
      return `<div class="row"><span class="mono" style="font-weight:700">${r.num}</span>`+
             `<span style="flex:1">${r.dest}</span><span class="mono">${r.time}</span>`+
             `<span class="mono" style="color:${col};min-width:56px;text-align:right">${dt}</span>`+
             `<span class="dim mono" style="min-width:30px;text-align:right">${r.plat}</span></div>`;
    }).join("")||`<div class="err">${t.err}</div>`;
    const mx=Math.max(0,...rows.map(r=>r.dly||0));
    lamp("L-trn", mx>=20?"alert":mx>=5?"warn":"ok", mx?("+"+mx+"′"):t.onTime);
    stamp("t-trn");
  }catch(e){ L.innerHTML=`<div class="err">${t.err}</div>`; S.textContent="—"; lamp("L-trn","","n/d"); }
}
$("trn-mode").onclick=()=>{
  trn.mode=trn.mode==="dep"?"arr":"dep";
  $("trn-mode").textContent=trn.mode==="arr"?T().arr:T().dep;
  loadTreni();
};
$("trn-q").addEventListener("keydown",e=>{ if(e.key==="Enter"){e.target.blur();trnSearch();} });
$("trn-q").addEventListener("change",trnSearch);

/* mappa → tabellone: hub di trasporto più vicino alla posizione attiva.
   NB: aggiorna solo il tabellone; il campo qui sopra resta consultabile in modo indipendente. */
async function trnFromPos(){
  try{
    const g=await j(`${TRANSITOUS}/api/v1/reverse-geocode?place=${POS.lat},${POS.lon}&type=STOP&numResults=25&language=${LANG}`);
    const arr=(Array.isArray(g)?g:[]).filter(x=>x&&x.id)
              .sort((a,b)=>(b.importance||0)-(a.importance||0));   // più grande/trafficato in testa
    if(!arr.length) return;
    const seen=new Set(); trn.hubs=[];
    for(const x of arr){ const k=(x.name||"").toLowerCase(); if(seen.has(k))continue; seen.add(k);
      trn.hubs.push({id:x.id,name:x.name}); if(trn.hubs.length>=6) break; }   // hub principale + fino a 5 alternative
    const m=trn.hubs[0];
    trn.net="wo"; trn.id=m.id; trn.name=m.name; trn.mm="all";
    document.querySelectorAll("#trn-modes button").forEach(x=>x.classList.toggle("on",x.dataset.mm==="all"));
    $("trn-q").value=m.name;
    loadTreni();
  }catch(e){}
}
/* aeroporti e porti vicini → marker sulla mappa (OpenStreetMap / Overpass, senza chiave) */
async function loadHubs(){
  try{
    if(!hubLayer) return;
    hubLayer.clearLayers();
    const la=POS.lat, lo=POS.lon;
    const q=`[out:json][timeout:25];(`+
      `nwr["aeroway"="aerodrome"]["iata"](around:60000,${la},${lo});`+   /* aeroporti veri, spesso lontani dal centro */
      `nwr["amenity"="ferry_terminal"](around:18000,${la},${lo});`+
      `nwr["harbour"="yes"](around:18000,${la},${lo});`+
      `);out center 40;`;
    const d=await j(`https://overpass-api.de/api/interpreter?data=${encodeURIComponent(q)}`);
    for(const el of (d.elements||[])){
      const la2=el.lat??(el.center&&el.center.lat), lo2=el.lon??(el.center&&el.center.lon);
      if(la2==null||lo2==null) continue;
      const air=el.tags&&el.tags.aeroway==="aerodrome";
      const nm=(el.tags&&(el.tags["name:"+LANG]||el.tags.name))||(air?"✈":"⚓");
      L.marker([la2,lo2],{icon:L.divIcon({html:air?"✈️":"⚓",className:"hubpin",iconSize:[22,22]})})
        .bindPopup(`${air?"✈️":"⚓"} <b>${nm}</b>`).addTo(hubLayer);
    }
  }catch(e){}
}
/* barra filtri modi (solo rete mondo): tutti / treni / bus / traghetti */
document.querySelectorAll("#trn-modes button").forEach(b=>b.onclick=()=>{
  trn.mm=b.dataset.mm;
  document.querySelectorAll("#trn-modes button").forEach(x=>x.classList.toggle("on",x===b));
  loadTreni();
});
